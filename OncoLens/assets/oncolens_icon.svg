<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" rx="48" fill="url(#bg-grad)"/>
  
  <!-- Logo centered -->
  <g transform="translate(128, 128)">
    <!-- Outer lens ring -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#fff" stroke-width="6" opacity="0.95"/>
    
    <!-- Inner lens ring -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="#fff" stroke-width="2" opacity="0.6"/>
    
    <!-- Cell representations -->
    <circle cx="-15" cy="-10" r="22" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
    <circle cx="-15" cy="-10" r="8" fill="#fff" opacity="0.8"/>
    
    <circle cx="20" cy="18" r="17" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>
    <circle cx="20" cy="18" r="6" fill="#fff" opacity="0.7"/>
    
    <circle cx="-5" cy="30" r="12" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="-5" cy="30" r="4" fill="#fff" opacity="0.6"/>
    
    <!-- Small cells -->
    <circle cx="35" cy="-20" r="8" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <circle cx="-38" cy="10" r="9" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    
    <!-- Crosshairs -->
    <line x1="-75" y1="0" x2="-60" y2="0" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="60" y1="0" x2="75" y2="0" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-75" x2="0" y2="-60" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="60" x2="0" y2="75" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
